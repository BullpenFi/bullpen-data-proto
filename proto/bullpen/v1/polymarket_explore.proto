syntax = "proto3";

package bullpen.v1;

import "google/protobuf/timestamp.proto";
import "bullpen/v1/common.proto";

// =============================================================================
// PolymarketExploreService — composable market discovery with lenses
//
// Core primitive: QueryMarkets with composable filter → score → sort → enrich
// Named presets: thin wrappers for common lens configurations
// =============================================================================

service PolymarketExploreService {
  // ---- Core composable query (the main primitive) ----
  rpc QueryMarkets(QueryMarketsRequest) returns (QueryMarketsResponse);
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse);

  // ---- Named lens presets (convenience, run predefined compositions) ----
  rpc GetHomepageSummary(GetHomepageSummaryRequest) returns (HomepageSummary);
  rpc GetFeaturedLens(GetFeaturedLensRequest) returns (QueryMarketsResponse);

  // ---- Single-entity lookups ----
  rpc GetEvent(GetEventRequest) returns (Event);
  rpc GetMarket(GetMarketRequest) returns (Market);
  rpc GetMarketAnalytics(GetMarketAnalyticsRequest) returns (MarketAnalytics);
  rpc GetMarketStrength(GetMarketStrengthRequest) returns (MarketStrength);

  // ---- Categories ----
  rpc GetCategories(GetCategoriesRequest) returns (GetCategoriesResponse);

  // ---- Social ----
  rpc GetMarketComments(GetMarketCommentsRequest) returns (GetMarketCommentsResponse);

  // ---- Gamma Auth (SIWE login for commenting) ----
  rpc GetGammaNonce(GetGammaNonceRequest) returns (GetGammaNonceResponse);
  rpc GammaLogin(GammaLoginRequest) returns (GammaLoginResponse);
  rpc PostComment(PostCommentRequest) returns (PostCommentResponse);
  rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse);
  rpc ReactToComment(ReactToCommentRequest) returns (ReactToCommentResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
  rpc ReplyToComment(ReplyToCommentRequest) returns (PostCommentResponse);

  // ---- Device Auth (Bullpen device flow → Gamma session) ----
  rpc InitDeviceAuth(InitDeviceAuthRequest) returns (InitDeviceAuthResponse);
  rpc PollDeviceSession(PollDeviceSessionRequest) returns (PollDeviceSessionResponse);

  // ---- Positions ----
  rpc RedeemPosition(RedeemPositionRequest) returns (RedeemPositionResponse);

  // ---- Bookmarks ----
  rpc ToggleBookmark(ToggleBookmarkRequest) returns (ToggleBookmarkResponse);
  rpc GetBookmarks(GetBookmarksRequest) returns (GetBookmarksResponse);

  // ---- Trade Analytics ----
  rpc GetTradeAnalytics(GetTradeAnalyticsRequest) returns (TradeAnalyticsResponse);
  rpc GetPnlLeaderboard(GetPnlLeaderboardRequest) returns (PnlLeaderboardResponse);
  rpc GetWalletProfile(GetWalletProfileRequest) returns (WalletProfile);

  // ---- Trader Discovery & Smart Money ----
  rpc GetTraderDiscovery(GetTraderDiscoveryRequest) returns (GetTraderDiscoveryResponse);
  rpc GetSmartMoneySignals(GetSmartMoneySignalsRequest) returns (GetSmartMoneySignalsResponse);
  rpc GetWalletTaxonomy(GetWalletTaxonomyRequest) returns (WalletTaxonomy);
  rpc GetSignificantTrades(GetSignificantTradesRequest) returns (GetSignificantTradesResponse);

  // ---- Event-level aggregation ----
  rpc GetEventAnalytics(GetEventAnalyticsRequest) returns (EventAnalytics);

  // ---- Wallet Positions ----
  rpc GetWalletPositions(GetWalletPositionsRequest) returns (GetWalletPositionsResponse);

  // ---- Pipeline Stats (dashboard) ----
  rpc GetPipelineStats(GetPipelineStatsRequest) returns (PipelineStats);

  // ---- Streaming ----
  rpc StreamMarketPrices(StreamMarketPricesRequest) returns (stream MarketPriceUpdate);

  // ---- Page views (complete page rendering) ----
  rpc GetPageView(GetPageViewRequest) returns (PageView);
}

// =============================================================================
// Composable query pipeline: filter → score → sort → enrich → paginate
// =============================================================================

message QueryMarketsRequest {
  MarketFilter filter = 1;
  ScoringConfig scoring = 2;
  SortConfig sort = 3;
  EnrichmentConfig enrichment = 4;
  PaginationRequest pagination = 5;
}

message QueryMarketsResponse {
  repeated MarketResult markets = 1;
  PaginationResponse pagination = 2;
  // Aggregate stats across the full result set (pre-pagination)
  ResultAggregates aggregates = 3;
}

message QueryEventsRequest {
  MarketFilter filter = 1;
  ScoringConfig scoring = 2;
  SortConfig sort = 3;
  EnrichmentConfig enrichment = 4;
  PaginationRequest pagination = 5;
}

message QueryEventsResponse {
  repeated EventResult events = 1;
  PaginationResponse pagination = 2;
  ResultAggregates aggregates = 3;
}

// ---------------------------------------------------------------------------
// Filter — what markets to include
// ---------------------------------------------------------------------------

message MarketFilter {
  // Text search
  string query = 1;

  // Category / tag filtering
  repeated string categories = 2;      // tag slugs
  repeated string tags = 3;            // specific tag IDs

  // Status
  StatusFilter status = 4;

  // Time range
  TimeRangeFilter time_range = 5;

  // Thresholds
  string min_volume = 6;
  string min_liquidity = 7;
  int32 min_unique_bettors = 8;

  // Specific IDs (for batch lookups)
  repeated string condition_ids = 9;
}

message StatusFilter {
  bool include_active = 1;    // default true
  bool include_closed = 2;
  bool include_archived = 3;
  bool include_resolved = 4;
}

message TimeRangeFilter {
  // Ending within
  google.protobuf.Timestamp ends_before = 1;
  google.protobuf.Timestamp ends_after = 2;
  // Created within
  google.protobuf.Timestamp created_after = 3;
  google.protobuf.Timestamp created_before = 4;
}

// ---------------------------------------------------------------------------
// Scoring — what lens/perspective to apply
// ---------------------------------------------------------------------------

message ScoringConfig {
  ScoringFunction function = 1;
  TimeWindow window = 2;

  // Optional: custom weights for COMPOSITE scoring
  repeated ScoringWeight weights = 3;
}

enum ScoringFunction {
  SCORING_UNSPECIFIED = 0;

  // Volume velocity — price movement + volume spike + new trader influx
  SCORING_TRENDING = 1;

  // What top-ranked traders are buying/selling
  SCORING_SMART_MONEY = 2;

  // Weighted YES vs NO side comparison (market strength)
  SCORING_MARKET_STRENGTH = 3;

  // Large holder concentration on one side
  SCORING_HIGH_CONVICTION = 4;

  // Spread analysis, implied probability divergence
  SCORING_MISPRICED = 5;

  // Recently created with early momentum
  SCORING_EARLY_MOMENTUM = 6;

  // Custom: client specifies dimension weights
  SCORING_COMPOSITE = 7;
}

message ScoringWeight {
  ScoringDimension dimension = 1;
  double weight = 2;  // 0.0 - 1.0
}

enum ScoringDimension {
  DIMENSION_UNSPECIFIED = 0;
  DIMENSION_VOLUME_24H = 1;
  DIMENSION_VOLUME_VELOCITY = 2;     // rate of change
  DIMENSION_LIQUIDITY = 3;
  DIMENSION_TRADER_INFLUX = 4;       // new unique traders
  DIMENSION_PRICE_MOVEMENT = 5;
  DIMENSION_OPEN_INTEREST = 6;
  DIMENSION_SPREAD_TIGHTNESS = 7;
  DIMENSION_HOLDER_CONCENTRATION = 8;
  DIMENSION_SMART_MONEY_FLOW = 9;    // top trader net position
  DIMENSION_COMMENT_ACTIVITY = 10;
}

// ---------------------------------------------------------------------------
// Sort — ordering of results
// ---------------------------------------------------------------------------

message SortConfig {
  SortField field = 1;
  SortOrder order = 2;
}

enum SortField {
  SORT_FIELD_UNSPECIFIED = 0;
  SORT_FIELD_SCORE = 1;         // from ScoringConfig
  SORT_FIELD_VOLUME = 2;
  SORT_FIELD_VOLUME_24H = 3;
  SORT_FIELD_LIQUIDITY = 4;
  SORT_FIELD_END_DATE = 5;
  SORT_FIELD_CREATED_AT = 6;
  SORT_FIELD_SPREAD = 7;
  SORT_FIELD_UNIQUE_BETTORS = 8;
  SORT_FIELD_OPEN_INTEREST = 9;
  SORT_FIELD_PRICE_CHANGE = 10;
}

// ---------------------------------------------------------------------------
// Enrichment — what extra data to include per result
// ---------------------------------------------------------------------------

message EnrichmentConfig {
  bool include_analytics = 1;        // volume, OI, spread stats
  bool include_market_strength = 2;  // YES vs NO strength scoring
  bool include_top_holders = 3;      // top N holders per side
  bool include_recent_trades = 4;    // last N trades
  bool include_price_history = 5;    // price series
  int32 top_holders_limit = 6;       // default 10
  int32 recent_trades_limit = 7;     // default 5
}

// ---------------------------------------------------------------------------
// Result types — market with optional enrichments
// ---------------------------------------------------------------------------

message MarketResult {
  Market market = 1;
  double score = 2;                  // from scoring function (0 if none)
  MarketAnalytics analytics = 3;     // if include_analytics
  MarketStrength strength = 4;       // if include_market_strength
}

message EventResult {
  Event event = 1;
  double score = 2;
  MarketAnalytics analytics = 3;
  MarketStrength strength = 4;
}

message ResultAggregates {
  int32 total_results = 1;
  string total_volume = 2;
  string avg_volume = 3;
  string min_volume = 4;
  string max_volume = 5;
  string total_liquidity = 6;
  // Per-field min/max for progress bar rendering
  map<string, FieldRange> field_ranges = 7;
}

message FieldRange {
  string min = 1;
  string max = 2;
}

// ---------------------------------------------------------------------------
// Market Strength — server-computed YES vs NO scoring
// ---------------------------------------------------------------------------

message GetMarketStrengthRequest {
  string condition_id = 1;
  int32 top_holders_per_side = 2;  // default 20
}

message MarketStrength {
  string yes_strength = 1;  // percentage (e.g., "65.3")
  string no_strength = 2;   // percentage

  // Per-dimension breakdown
  repeated StrengthDimension dimensions = 3;

  // Top holders with tags (enriched)
  repeated TaggedHolder yes_holders = 4;
  repeated TaggedHolder no_holders = 5;
}

message StrengthDimension {
  string name = 1;        // "cash_balance", "weighted_pnl", "emoji_score", etc.
  string yes_value = 2;
  string no_value = 3;
  double weight = 4;      // 0.0 - 1.0
}

message TaggedHolder {
  string address = 1;
  string name = 2;
  string image = 3;
  string size = 4;
  string avg_price = 5;
  string pnl = 6;
  int32 emoji_score = 7;
  repeated TraderTag tags = 8;
}

// =============================================================================
// Named lens presets
// =============================================================================

message GetFeaturedLensRequest {
  FeaturedLens lens = 1;
  int32 limit = 2;
  TimeWindow window = 3;
}

enum FeaturedLens {
  FEATURED_LENS_UNSPECIFIED = 0;
  FEATURED_LENS_TRENDING = 1;       // high volume velocity
  FEATURED_LENS_ENDING_SOON = 2;    // ending within 24-72h with volume
  FEATURED_LENS_SMART_MONEY = 3;    // top trader activity
  FEATURED_LENS_HIGH_CONVICTION = 4; // concentrated positions
  FEATURED_LENS_MISPRICED = 5;       // wide spreads / probability divergence
  FEATURED_LENS_NEW_AND_HOT = 6;     // early momentum
  FEATURED_LENS_BIGGEST_MARKETS = 7; // highest volume/OI
}

// =============================================================================
// Shared market types
// =============================================================================

message GetHomepageSummaryRequest {}

message HomepageSummary {
  int64 total_traders = 1;
  int64 total_markets = 2;
  int64 total_positions = 3;
  string total_volume = 4;
}

message GetEventRequest {
  oneof identifier {
    string slug = 1;
    string event_id = 2;
  }
  string locale = 3;
}

message Event {
  string event_id = 1;
  string title = 2;
  string slug = 3;
  string description = 4;
  string image = 5;
  repeated Market markets = 6;
  string volume = 7;
  string volume_24h = 8;
  string liquidity = 9;
  int64 comment_count = 10;
  int64 unique_bettors = 11;
  bool active = 12;
  bool closed = 13;
  bool resolved = 14;
  string resolution = 15;
  repeated string tags = 16;
  google.protobuf.Timestamp end_date = 17;
  google.protobuf.Timestamp created_at = 18;
  bool is_new = 19;
  string recurrence = 20;

  // Sports-specific fields
  string score = 21;              // "93-114" (away-home)
  string period = 22;             // "Q4", "H2", "P1", "HT"
  string elapsed = 23;            // "04:51" time remaining/elapsed
  bool live = 24;                 // true if game is in-progress
  bool ended = 25;                // true if game has ended
  int32 game_id = 26;             // Gamma gameId
  string start_time = 27;         // ISO timestamp of game start
  string league = 28;             // "NBA", "EPL", "NHL" etc.

  // Team data for game events (populated for "Team A vs. Team B" events)
  Team home_team = 29;
  Team away_team = 30;

  // AI-generated market context (from Gamma eventMetadata)
  string context_description = 31;  // AI summary text
  string context_updated_at = 32;   // ISO timestamp of last context update

  // Classification fields
  string display_type = 33;  // 'sports_game', 'crypto_updown', 'multi_outcome', 'binary'
  string category = 34;      // top-level category (e.g. 'Sports', 'Politics')
}

message GetMarketRequest {
  oneof identifier {
    string condition_id = 1;
    string slug = 2;
  }
}

message Market {
  string condition_id = 1;
  string question = 2;
  string slug = 3;
  string description = 4;
  string category = 5;
  string image = 6;
  string outcome_yes_token = 7;
  string outcome_no_token = 8;
  string yes_price = 9;
  string no_price = 10;
  string volume = 11;
  string liquidity = 12;
  string spread = 13;
  int64 unique_bettors = 14;
  bool active = 15;
  bool closed = 16;
  bool resolved = 17;
  string resolution = 18;
  string minimum_order_size = 19;
  string minimum_tick_size = 20;
  bool neg_risk = 21;
  repeated string clob_token_ids = 22;
  google.protobuf.Timestamp end_date = 23;
  google.protobuf.Timestamp created_at = 24;
  string group_item_title = 25;
  string sports_market_type = 26; // "moneyline", "spread", "totals"
  string line = 27;               // "-3.5", "+3.5", "227.5"
  string game_start_time = 28;    // ISO timestamp
  repeated string outcomes = 29;  // ["Trail Blazers", "Timberwolves"]
  repeated string outcome_prices = 30;  // Full outcome price array for 3+ outcome markets
}

message Team {
  int32 id = 1;
  string name = 2;
  string league = 3;
  string record = 4;
  string logo = 5;
  string abbreviation = 6;
  string color = 7;
}

message GetMarketAnalyticsRequest {
  string slug = 1;
}

message MarketAnalytics {
  string volume = 1;
  string volume_24h = 2;
  string open_interest = 3;
  string spread = 4;
  int64 unique_bettors = 5;
  int64 comment_count = 6;
  string market_cap = 7;
  string total_shares = 8;
  string highest_odds = 9;
}

// Categories

message GetCategoriesRequest {}

message Category {
  string id = 1;
  string label = 2;
  string slug = 3;
  repeated SubCategory sub_categories = 4;
}

message SubCategory {
  string id = 1;
  string label = 2;
  string slug = 3;
}

message GetCategoriesResponse {
  repeated Category categories = 1;
}

// Comments

message GetMarketCommentsRequest {
  string market_id = 1;
  PaginationRequest pagination = 2;
  bool holders_only = 3;
}

message CommentPositionBadge {
  string name = 1;       // outcome name: "Croatia", "Finland"
  string size_label = 2; // formatted: "142.8K", "16.7K"
  bool is_yes = 3;       // true = Yes side (green), false = No side (red)
}

message CommentMedia {
  string url = 1;
  string alt_text = 2;
  string media_type = 3;   // "gif", "image", etc.
  string provider = 4;     // "giphy", etc.
}

message Comment {
  string id = 1;
  string body = 2;
  string user_address = 3;
  string user_name = 4;
  string user_image = 5;
  int32 reaction_count = 6;
  repeated Comment replies = 7;
  google.protobuf.Timestamp created_at = 8;
  CommentPositionBadge top_position = 9;           // largest position badge (for inline display)
  repeated CommentPositionBadge all_positions = 10; // top 8 for dropdown
  repeated CommentMedia media = 11;                // GIFs, images from Giphy etc.
}

message GetMarketCommentsResponse {
  repeated Comment comments = 1;
  PaginationResponse pagination = 2;
}

// Gamma Auth

message GetGammaNonceRequest {
  string wallet_address = 1;
}

message GetGammaNonceResponse {
  string nonce = 1;
  string siwe_message = 2;  // The SIWE text to sign with personal_sign
  string issued_at = 3;     // Timestamp used in the message
}

message GammaLoginRequest {
  string wallet_address = 1;
  string nonce = 2;
  string signature = 3;      // The personal_sign result (0x-prefixed hex)
  string issued_at = 4;      // Must match the issued_at from GetGammaNonceResponse
}

message GammaLoginResponse {
  bool success = 1;
  string address = 2;
}

message PostCommentRequest {
  string wallet_address = 1;  // Must have active Gamma session
  int64 event_id = 2;         // Gamma event numeric ID
  string body = 3;            // Comment text
}

message PostCommentResponse {
  string comment_id = 1;
  string body = 2;
  string user_address = 3;
  string created_at = 4;
}

message GetCommentsRequest {
  int64 event_id = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool holders_only = 4;
  bool ascending = 5;
}

message GetCommentsResponse {
  repeated Comment comments = 1;
  int32 total_count = 2;
}

message ReactToCommentRequest {
  string wallet_address = 1;
  int64 comment_id = 2;
  string reaction_type = 3;
}

message ReactToCommentResponse {
  string reaction_id = 1;
  int64 comment_id = 2;
  string reaction_type = 3;
  string user_address = 4;
  string created_at = 5;
}

message DeleteCommentRequest {
  string wallet_address = 1;
  string comment_id = 2;
}

message DeleteCommentResponse {}

message ReplyToCommentRequest {
  string wallet_address = 1;
  int64 event_id = 2;
  string body = 3;
  string parent_comment_id = 4;
  string reply_address = 5;
}

// Device Auth

message InitDeviceAuthRequest {}

message InitDeviceAuthResponse {
  string device_code = 1;
  string user_code = 2;
  string verification_uri = 3;
  int32 expires_in = 4;
  int32 interval = 5;
}

message PollDeviceSessionRequest {
  string device_code = 1;
}

message PollDeviceSessionResponse {
  string status = 1;           // "pending", "completed", "expired"
  string wallet_address = 2;   // Set when status=completed
  bool gamma_authenticated = 3; // Whether Gamma session is active
}

// Streaming

message StreamMarketPricesRequest {
  repeated string token_ids = 1;
}

message MarketPriceUpdate {
  string token_id = 1;
  string price = 2;
  google.protobuf.Timestamp timestamp = 3;
}

// =============================================================================
// Page Views — ready-to-render pages returned by GetPageView
// =============================================================================

message GetPageViewRequest {
  string page_id = 1;
  string sub_category = 2;
  string date_filter = 3;
  PaginationRequest pagination = 4;
  map<string, string> params = 5;
  string locale = 6;
}

message PageView {
  string page_id = 1;
  string title = 2;
  string description = 3;
  repeated PageTab tabs = 4;
  string active_tab = 5;
  repeated PageSection sections = 6;
  int32 cache_ttl_seconds = 7;
  repeated string available_dates = 8;
  string active_date = 9;
}

message PageTab {
  string id = 1;
  string label = 2;
  string slug = 3;
  int32 count = 4;
  string icon = 5;
  // Volume of trading activity for this topic/category (USD).
  // When set, the frontend shows "$12.0K today" in green instead of "X mkts".
  double volume = 6;
}

message PageSection {
  string section_id = 1;
  string title = 2;
  oneof content {
    EventGridSection event_grid = 10;
    CategoryNavSection category_nav = 11;
    StatsBarSection stats_bar = 12;
    MarketListSection market_list = 13;
    SportsGameSection sports_games = 14;
  }
}

message EventGridSection {
  repeated EventResult events = 1;
  int32 total_count = 2;
  bool truncated = 3;
  SortConfig applied_sort = 4;
}

message CategoryNavSection {
  repeated PageTab categories = 1;
  string active_category = 2;
}

message StatsBarSection {
  repeated StatItem stats = 1;
}

message StatItem {
  string label = 1;
  string value = 2;
  string icon = 3;
}

message MarketListSection {
  repeated MarketRow markets = 1;
  int32 total_count = 2;
}

message SportsGameSection {
  string league = 1;
  string date_label = 2;
  repeated SportsGame games = 3;
  int32 total_count = 4;
}

message SportsGame {
  string event_id = 1;
  string event_slug = 2;
  string title = 3;
  Team home_team = 4;
  Team away_team = 5;
  string score = 6;
  string home_score = 7;
  string away_score = 8;
  string period = 9;
  string elapsed = 10;
  bool live = 11;
  bool ended = 12;
  string start_time = 13;
  OddsColumn moneyline = 14;
  OddsColumn spread = 15;
  OddsColumn total = 16;
  string volume = 17;
  string volume_24h = 18;
  int32 market_count = 19;
  string image = 20;
}

message OddsColumn {
  string market_type = 1;
  string condition_id = 2;
  string line = 3;
  string home_price = 4;
  string away_price = 5;
  string home_label = 6;
  string away_label = 7;
  repeated string clob_token_ids = 8;
  repeated OddsLine alt_lines = 9;
}

message OddsLine {
  string line = 1;
  string home_price = 2;
  string away_price = 3;
  string condition_id = 4;
}

message MarketRow {
  int32 rank = 1;
  string slug = 2;
  string event_slug = 3;
  string question = 4;
  string image = 5;
  string current_price = 6;
  int32 live_price_change = 7;
  string one_day_price_change = 8;
  repeated string clob_token_ids = 9;
  repeated PricePoint history = 10;
  bool closed = 11;
  string volume = 12;
  int32 comment_count = 13;
}

message PricePoint {
  int64 timestamp = 1;
  string price = 2;
}

// Bookmarks

message ToggleBookmarkRequest {
  string event_id = 1;
  string event_slug = 2;
}

message ToggleBookmarkResponse {
  bool bookmarked = 1;
}

message GetBookmarksRequest {}

message GetBookmarksResponse {
  repeated string event_slugs = 1;
}

// Redeem

message RedeemPositionRequest {
  string condition_id = 1;
  int32 outcome_index = 2;
}

message RedeemPositionResponse {
  bool success = 1;
  string message = 2;
  string tx_hash = 3;
}

// =============================================================================
// Trade Analytics
// =============================================================================

message GetTradeAnalyticsRequest {
  // Empty = return all analytics. Optional filters:
  string period = 1;          // "7d", "30d", "90d", "all" (default: "30d")
}

message TradeAnalyticsResponse {
  // Volume over time (daily)
  repeated DailyVolume daily_volume = 1;

  // Trade size distribution
  repeated TradeSizeBucket size_distribution = 2;

  // Hourly trading pattern
  repeated HourlyPattern hourly_pattern = 3;

  // Top traders
  repeated TopTrader top_traders = 4;

  // Summary stats
  AnalyticsSummary summary = 5;

  // Market calibration (win rate vs price)
  repeated CalibrationPoint calibration = 6;

  // Maker vs taker excess returns by price bucket
  repeated MakerTakerBucket maker_taker = 7;

  // Calibration quality metrics
  CalibrationMetrics calibration_metrics = 8;
}

message DailyVolume {
  string date = 1;             // "2026-03-30"
  int64 trade_count = 2;
  double total_volume = 3;     // USDC
  int64 unique_traders = 4;
  double buy_volume = 5;
  double sell_volume = 6;
}

message TradeSizeBucket {
  string bucket = 1;           // "<$10", "$10-100", "$100-1K", "$1K-10K", "$10K+"
  string side = 2;             // "BUY" or "SELL"
  int64 trade_count = 3;
  double total_volume = 4;
}

message HourlyPattern {
  int32 hour = 1;              // 0-23 UTC
  int64 trade_count = 2;
  double total_volume = 3;
  double avg_size = 4;
}

message TopTrader {
  string address = 1;
  string name = 2;             // pseudonym if available
  string profile_image = 3;
  int64 trade_count = 4;
  double total_volume = 5;
  double buy_volume = 6;
  double sell_volume = 7;
  int64 unique_markets = 8;
  double avg_trade_size = 9;
}

message AnalyticsSummary {
  int64 total_trades = 1;
  double total_volume = 2;
  int64 unique_traders = 3;
  int64 active_markets = 4;
  double avg_trade_size = 5;
  double median_trade_size = 6;
  string period = 7;           // the period these stats cover
}

message CalibrationPoint {
  int32 price = 1;            // 1-99 cents
  int64 total_trades = 2;
  int64 wins = 3;
  double win_rate = 4;        // percentage (0-100)
}

message MakerTakerBucket {
  int32 price_bucket = 1;     // 5, 10, ..., 95
  string role = 2;            // "maker" or "taker"
  int64 total_trades = 3;
  int64 wins = 4;
  int64 losses = 5;
  double avg_return = 6;
  double total_volume = 7;
}

message CalibrationMetrics {
  double brier_score = 1;
  double log_loss = 2;
  double ece = 3;
  int64 total_resolved_trades = 4;
}

message GetPnlLeaderboardRequest {
  string period = 1;
  string category = 2;
  int32 limit = 3;
}

message PnlLeaderboardResponse {
  repeated PnlLeaderboardEntry entries = 1;
}

message PnlLeaderboardEntry {
  string address = 1;
  string name = 2;
  double unrealized_pnl = 3;
  double realized_pnl = 4;
  double total_pnl = 5;
  double total_invested = 6;
  double roi = 7;
  int32 open_positions = 8;
  int64 trade_count = 9;
}

// =============================================================================
// Wallet Profile
// =============================================================================

message GetWalletProfileRequest {
  string address = 1;
}

message WalletProfile {
  string address = 1;
  string name = 2;
  string profile_image = 3;

  // P&L overview
  double unrealized_pnl = 4;
  double realized_pnl = 5;
  double total_pnl = 6;
  double total_invested = 7;
  double roi = 8;
  int32 open_positions = 9;

  // P&L windows
  double pnl_change_24h = 10;
  double pnl_change_7d = 11;
  double pnl_change_30d = 12;

  // Trade activity
  int64 first_trade_at_unix = 13;
  int64 last_trade_at_unix = 14;
  int64 total_trades = 15;
  int64 trades_last_7d = 16;
  int64 trades_last_30d = 17;
  double trades_per_week = 18;
  double trades_per_month = 19;
  double sell_frequency = 20;
  int64 unique_markets = 21;

  // Resolved market performance
  int32 resolved_positions = 22;
  int32 wins = 23;
  int32 losses = 24;
  double win_rate = 25;
  double profit_factor = 26;
  double avg_hold_duration_hours = 27;
  double biggest_win = 28;
  double biggest_loss = 29;
  string current_streak_type = 30;
  int32 current_streak_count = 31;
  int32 longest_win_streak = 32;
  int32 longest_loss_streak = 33;

  // Per-category breakdown
  repeated WalletCategoryBreakdown category_breakdown = 34;

  // Staleness indicator: seconds since the P&L snapshot was last computed.
  // -1 means snapshot_time is unknown. Frontend uses this to show a stale-data warning.
  int64 snapshot_age_seconds = 35;

  // Extended P&L analytics (from wallet_pnl_snapshot extended columns)
  double max_drawdown = 36;
  double roi_stored = 37;
  double pnl_volatility = 38;
  double roi_risk_adjusted = 39;
  double pnl_change_90d = 40;
  double usdc_balance = 41;

  // Taxonomy (from wallet_taxonomy)
  string trader_archetype = 42;
  string risk_profile = 43;
  double copyability_score = 44;
  string strategy_badge = 45;
  string trader_tier = 46;
  string summary = 47;

  // Additional taxonomy fields
  bool is_bot = 48;
  bool is_smart_money = 49;
  string specialist_generalist = 50;
  double avg_trade_size = 51;
  repeated string category_tags = 52;

  // CLV (Closing Line Value) stats
  double avg_clv = 53;
  double clv_positive_rate = 54;

  // Similar traders (from wallet_similar_traders)
  repeated SimilarTrader similar_traders = 55;
}

message SimilarTrader {
  string address = 1;
  string name = 2;
  double similarity_score = 3;
  int32 shared_markets = 4;
}

message WalletCategoryBreakdown {
  string category = 1;
  int64 trade_count = 2;
  double total_volume = 3;
  double unrealized_pnl = 4;
  double realized_pnl = 5;
  bool is_primary = 6;
}

// =============================================================================
