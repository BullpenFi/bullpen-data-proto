// =============================================================================

message GetPipelineStatsRequest {}

message TableStat {
  string name = 1;
  int64 row_count = 2;
  string last_updated = 3;  // ISO timestamp from max(modification_time)
}

message CronJobStat {
  string name = 1;
  string interval = 2;
  string last_run = 3;      // ISO timestamp
  string status = 4;        // "ok" or "warn"
  int64 rows_processed = 5;
}

message PipelineStats {
  // Entity counts
  int64 events_count = 1;
  int64 markets_count = 2;
  int64 trades_count = 3;
  int64 wallets_tracked = 4;
  int64 positions_count = 5;
  int64 interesting_wallets_count = 6;
  int64 smart_money_markets = 7;
  int64 taxonomy_wallets = 8;
  // Table details
  repeated TableStat tables = 9;
  // Cron jobs
  repeated CronJobStat cron_jobs = 10;
}

