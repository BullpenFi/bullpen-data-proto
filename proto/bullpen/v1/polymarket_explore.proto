message GetTraderDiscoveryRequest {
  string category = 1;           // filter by category tag (empty = all)
  string archetype = 2;          // filter: value_hunter, contrarian, scalper, etc.
  string risk_profile = 3;       // filter: conservative, moderate, aggressive
  string trader_tier = 4;        // filter: whale, large, medium, small
  double min_pnl = 5;            // minimum lifetime P&L
  double min_win_rate = 6;       // minimum win rate (0-1)
  bool smart_money_only = 7;     // only smart money wallets
  double min_copyability = 8;    // minimum copyability score (0-1)
  string sort_by = 9;            // pnl, win_rate, copyability, volume (default: pnl)
  bool ascending = 10;
  PaginationRequest pagination = 11;
}

message TraderCard {
  string address = 1;
  string name = 2;
  string profile_image = 3;
  // P&L
  double total_pnl = 4;
  double unrealized_pnl = 5;
  double realized_pnl = 6;
  double pnl_change_24h = 7;
  double pnl_change_7d = 8;
  double pnl_change_30d = 9;
  double roi = 10;
  double max_drawdown = 11;
  // Performance
  double win_rate = 12;
  double profit_factor = 13;
  int32 resolved_positions = 14;
  int32 open_positions = 15;
  // Taxonomy
  string trader_archetype = 16;
  string risk_profile = 17;
  string trader_tier = 18;
  string strategy_badge = 19;
  double copyability_score = 20;
  bool is_smart_money = 21;
  bool is_bot = 22;
  string specialist_generalist = 23;
  repeated string category_tags = 24;
  string summary = 25;
  // Activity
  double trades_per_week = 26;
  double avg_trade_size = 27;
  double avg_hold_duration_hours = 28;
}

message GetTraderDiscoveryResponse {
  repeated TraderCard traders = 1;
  int32 total_count = 2;
}

